# Logstash SNMP collector for kibana-network-o11y
# ──────────────────────────────────────────────────────────────────────────────
# Requirements:
#   bin/logstash-plugin install logstash-input-snmp
#   Logstash 8.x+
#
# This pipeline produces three document types per poll:
#   - Interface metrics (one doc per interface)
#   - ARP table entries (one doc per ARP entry)
#   - MAC forwarding table entries (one doc per MAC entry)
#
# All three pipelines use SNMP Walk (a single OID subtree traversal) instead
# of table operations. Walk issues one continuous GETBULK/GETNEXT sequence
# rather than per-column requests, which is significantly less stressful on
# device SNMP agents and avoids repeat polling failures on constrained hardware.
#
# The Ruby filters match on MIB entry node names (e.g. "ifEntry") rather than
# numeric OID prefixes, which is required because Logstash resolves walk OIDs
# to their full MIB path names:
#   iso.org.dod.internet.mgmt.mib-2.interfaces.ifTable.ifEntry.ifAdminStatus.19
#
# Replace: DEVICE_IP, YOUR_SITE, YOUR_ROLE, YOUR_ES_HOST, YOUR_PASSWORD
# ──────────────────────────────────────────────────────────────────────────────

# ── Pipeline 1: Interface metrics ─────────────────────────────────────────────
input {
  snmp {
    id       => "snmp_interfaces"
    hosts    => [{ host => "udp:DEVICE_IP/161" community => "public" version => "2c" }]
    get      => [
      "1.3.6.1.2.1.1.5.0",   # sysName
      "1.3.6.1.2.1.1.1.0"    # sysDescr
    ]
    walk     => ["1.3.6.1.2.1.2.2"]   # IF-MIB::ifTable — single walk of entire subtree
    interval => 60
    add_field => {
      "[network][site]"  => "YOUR_SITE"    # e.g. HQ-DC1
      "[network][role]"  => "YOUR_ROLE"    # core | distribution | access | server
      # host.ip is derived from [@metadata][host_address] in the filter — no static field needed
    }
  }
}

filter {
  # Walk produces a flat map of MIB-resolved OID path → value pairs in one event.
  # Keys look like: iso.org.dod.internet.mgmt.mib-2.interfaces.ifTable.ifEntry.<col>.<idx>
  # Group by interface index and emit one event per interface row.
  ruby {
    code => '
      # Extract sysName / sysDescr regardless of key format (MIB path or MIB::name notation)
      host_name = nil
      sys_descr = nil
      # [@metadata][host_address] is set by the SNMP plugin for every polled host,
      # so this works correctly when multiple devices share a single input block.
      # ECS-disabled pipelines use [@metadata][host_address];
      # ECS v1/v8 pipelines (Logstash 8 default) use the longer path.
      host_ip = event.get("[@metadata][host_address]") ||
                event.get("[@metadata][input][snmp][host][address]") || ""
      site      = event.get("[network][site]") || ""
      role      = event.get("[network][role]") || ""
      timestamp = event.get("@timestamp")

      col_set = %w[ifDescr ifSpeed ifAdminStatus ifOperStatus
                   ifInOctets ifInErrors ifOutOctets ifOutErrors].to_set

      admin_map = { "1" => "up", "2" => "down", "3" => "testing" }
      oper_map  = { "1" => "up", "2" => "down", "3" => "testing",
                    "4" => "unknown", "5" => "dormant" }

      interfaces = {}

      event.to_hash.each do |key, val|
        # Capture sysName / sysDescr from get scalars (any key format)
        if key =~ /sysName\.0$/i
          host_name = val.to_s
          next
        end
        if key =~ /sysDescr\.0$/i
          sys_descr = val.to_s
          next
        end

        # Match ifTable entries: ...ifEntry.<colName>.<ifIndex>
        m = key.match(/\.ifEntry\.(\w+)\.(\d+(?:\.\d+)*)$/)
        next unless m
        col, idx = m[1], m[2]
        next unless col_set.include?(col)
        interfaces[idx] ||= {}
        interfaces[idx][col] = val
      end

      interfaces.each do |_idx, data|
        e = LogStash::Event.new
        e.set("@timestamp",                       timestamp)
        e.set("[host][name]",                     host_name.to_s)
        e.set("[host][ip]",                       host_ip)
        e.set("[observer][sys_descr]",            sys_descr.to_s)
        e.set("[network][site]",                  site)
        e.set("[network][role]",                  role)
        e.set("[interface][name]",                data["ifDescr"].to_s)
        e.set("[interface][speed]",               data["ifSpeed"].to_i)
        e.set("[interface][traffic][in][bytes]",  data["ifInOctets"].to_i)
        e.set("[interface][traffic][out][bytes]", data["ifOutOctets"].to_i)
        e.set("[interface][errors][in]",          data["ifInErrors"].to_i)
        e.set("[interface][errors][out]",         data["ifOutErrors"].to_i)
        e.set("[interface][status][admin]",
              admin_map[data["ifAdminStatus"].to_s] || data["ifAdminStatus"].to_s)
        e.set("[interface][status][oper]",
              oper_map[data["ifOperStatus"].to_s]   || data["ifOperStatus"].to_s)
        new_event_block.call(e)
      end

      event.cancel
    '
    tag_on_exception => "_ruby_exception"
  }
}

output {
  elasticsearch {
    hosts    => ["https://YOUR_ES_HOST:9200"]
    user     => "elastic"
    password => "YOUR_PASSWORD"
    ssl_certificate_verification => false
    index    => "snmp-%{+YYYY.MM.dd}"
    pipeline => "snmp-device-enrichment"
  }
}


# ── Pipeline 2: ARP table ──────────────────────────────────────────────────────
# Run as a separate Logstash pipeline (pipelines.yml) or merge into pipeline 1.

input {
  snmp {
    id    => "snmp_arp"
    hosts => [{ host => "udp:DEVICE_IP/161" community => "public" version => "2c" }]
    get   => [
      "1.3.6.1.2.1.1.5.0",   # sysName
      "1.3.6.1.2.1.1.1.0"    # sysDescr
    ]
    walk  => ["1.3.6.1.2.1.4.22"]   # IP-MIB::ipNetToMediaTable
    interval => 120
    add_field => {
      "[network][site]" => "YOUR_SITE"
      "[network][role]" => "YOUR_ROLE"
    }
  }
}

filter {
  # Keys: iso.org.dod.internet.mgmt.mib-2.ip.ipNetToMediaTable.ipNetToMediaEntry.<col>.<ifIdx>.<a>.<b>.<c>.<d>
  # Instance index is <ifIndex>.<ipAddress> — used as grouping key as-is.
  ruby {
    code => '
      host_name = nil
      sys_descr = nil
      # ECS-disabled pipelines use [@metadata][host_address];
      # ECS v1/v8 pipelines (Logstash 8 default) use the longer path.
      host_ip = event.get("[@metadata][host_address]") ||
                event.get("[@metadata][input][snmp][host][address]") || ""
      site      = event.get("[network][site]") || ""
      role      = event.get("[network][role]") || ""
      timestamp = event.get("@timestamp")

      col_set = %w[ipNetToMediaIfIndex ipNetToMediaPhysAddress ipNetToMediaNetAddress].to_set

      entries = {}

      event.to_hash.each do |key, val|
        if key =~ /sysName\.0$/i
          host_name = val.to_s
          next
        end
        if key =~ /sysDescr\.0$/i
          sys_descr = val.to_s
          next
        end

        m = key.match(/\.ipNetToMediaEntry\.(\w+)\.(.+)$/)
        next unless m
        col, idx = m[1], m[2]
        next unless col_set.include?(col)
        entries[idx] ||= {}
        entries[idx][col] = val
      end

      entries.each do |_idx, data|
        next unless data["ipNetToMediaPhysAddress"] && data["ipNetToMediaNetAddress"]
        e = LogStash::Event.new
        e.set("@timestamp",            timestamp)
        e.set("[host][name]",          host_name.to_s)
        e.set("[host][ip]",            host_ip)
        e.set("[observer][sys_descr]", sys_descr.to_s)
        e.set("[network][site]",       site)
        e.set("[network][role]",       role)
        e.set("[arp][mac_addr]",       data["ipNetToMediaPhysAddress"].to_s)
        e.set("[arp][ip_addr]",        data["ipNetToMediaNetAddress"].to_s)
        e.set("[arp][interface_index]", data["ipNetToMediaIfIndex"].to_i)
        new_event_block.call(e)
      end

      event.cancel
    '
    tag_on_exception => "_ruby_exception"
  }
}

output {
  elasticsearch {
    hosts    => ["https://YOUR_ES_HOST:9200"]
    user     => "elastic"
    password => "YOUR_PASSWORD"
    ssl_certificate_verification => false
    index    => "snmp-%{+YYYY.MM.dd}"
    pipeline => "snmp-device-enrichment"
  }
}


# ── Pipeline 3: MAC forwarding table (switches only) ──────────────────────────

input {
  snmp {
    id    => "snmp_mac_table"
    hosts => [{ host => "udp:DEVICE_IP/161" community => "public" version => "2c" }]
    get   => [
      "1.3.6.1.2.1.1.5.0",
      "1.3.6.1.2.1.1.1.0"
    ]
    walk  => ["1.3.6.1.2.1.17.4.3"]   # BRIDGE-MIB::dot1dTpFdbTable
    interval => 120
    add_field => {
      "[network][site]" => "YOUR_SITE"
      "[network][role]" => "YOUR_ROLE"
    }
  }
}

filter {
  # Keys: iso.org.dod.internet.mgmt.mib-2.dot1dBridge.dot1dTp.dot1dTpFdbTable.dot1dTpFdbEntry.<col>.<mac-octets>
  # Instance index is the 6 MAC octets — used as grouping key as-is.
  # Status values: 1=other, 2=invalid, 3=learned, 4=static/self, 5=mgmt
  ruby {
    code => '
      host_name = nil
      sys_descr = nil
      # ECS-disabled pipelines use [@metadata][host_address];
      # ECS v1/v8 pipelines (Logstash 8 default) use the longer path.
      host_ip = event.get("[@metadata][host_address]") ||
                event.get("[@metadata][input][snmp][host][address]") || ""
      site      = event.get("[network][site]") || ""
      role      = event.get("[network][role]") || ""
      timestamp = event.get("@timestamp")

      status_map = { "3" => "learned", "4" => "static", "5" => "mgmt" }
      col_set    = %w[dot1dTpFdbAddress dot1dTpFdbPort dot1dTpFdbStatus].to_set

      entries = {}

      event.to_hash.each do |key, val|
        if key =~ /sysName\.0$/i
          host_name = val.to_s
          next
        end
        if key =~ /sysDescr\.0$/i
          sys_descr = val.to_s
          next
        end

        m = key.match(/\.dot1dTpFdbEntry\.(\w+)\.(.+)$/)
        next unless m
        col, idx = m[1], m[2]
        next unless col_set.include?(col)
        entries[idx] ||= {}
        entries[idx][col] = val
      end

      entries.each do |_idx, data|
        status_label = status_map[data["dot1dTpFdbStatus"].to_s]
        next unless status_label   # drop other/invalid entries

        e = LogStash::Event.new
        e.set("@timestamp",            timestamp)
        e.set("[host][name]",          host_name.to_s)
        e.set("[host][ip]",            host_ip)
        e.set("[observer][sys_descr]", sys_descr.to_s)
        e.set("[network][site]",       site)
        e.set("[network][role]",       role)
        e.set("[mac_table][mac_addr]",   data["dot1dTpFdbAddress"].to_s)
        e.set("[mac_table][port_index]", data["dot1dTpFdbPort"].to_i)
        e.set("[mac_table][status]",     status_label)
        new_event_block.call(e)
      end

      event.cancel
    '
    tag_on_exception => "_ruby_exception"
  }
}

output {
  elasticsearch {
    hosts    => ["https://YOUR_ES_HOST:9200"]
    user     => "elastic"
    password => "YOUR_PASSWORD"
    ssl_certificate_verification => false
    index    => "snmp-%{+YYYY.MM.dd}"
    pipeline => "snmp-device-enrichment"
  }
}

# Logstash SNMP collector for kibana-network-o11y
# ──────────────────────────────────────────────────────────────────────────────
# Requirements:
#   bin/logstash-plugin install logstash-input-snmp
#   Logstash 8.x+
#
# Architecture: ONE PIPELINE PER DEVICE ROLE
#   Duplicate this file for each role in your network (e.g. snmp-core.conf,
#   snmp-distribution.conf, snmp-access.conf). Each pipeline walks ALL four
#   SNMP tables in a single poll per device — no key collisions because OID
#   paths are namespaced by MIB entry name (ifEntry, ipNetToMediaEntry, etc.).
#
# The unified Ruby filter parses all four table types in one pass and emits
# the correct document type for each row:
#   - Interface metrics   (one doc per interface)
#   - ARP table entries   (one doc per ARP entry)
#   - MAC forwarding      (one doc per MAC entry)
#   - IP address table    (one doc per interface IP, includes netmask/CIDR)
#
# Device type classification:
#   host.type (router, switch, firewall, ap, server) is set explicitly here
#   rather than inferred from sysDescr — vendor string permutations are too
#   unreliable. Two options:
#
#   1. add_field: set [host][type] in the input block when all devices in
#      the pipeline are the same type (e.g. a "core routers" pipeline).
#
#   2. translate filter: use a YAML dictionary file for per-device overrides
#      when a pipeline contains mixed device types. The translate filter
#      runs on each emitted event and matches by host.ip. See the optional
#      translate block below the Ruby filter.
#
#   The Elasticsearch ingest pipeline (snmp-device-enrichment) still acts as
#   a fallback — it only infers type when host.type is "unknown" or unset.
#
# Replace: DEVICE_*_IP, YOUR_SITE, YOUR_ROLE, YOUR_TYPE, YOUR_ES_HOST, YOUR_PASSWORD
#
# See the pipelines.yml example at the bottom of this file for multi-role
# deployment.
# ──────────────────────────────────────────────────────────────────────────────

input {
  snmp {
    id       => "snmp_YOUR_ROLE"
    hosts    => [
      { host => "udp:DEVICE_1_IP/161" community => "public" version => "2c" },
      { host => "udp:DEVICE_2_IP/161" community => "public" version => "2c" }
    ]
    get      => [
      "1.3.6.1.2.1.1.5.0",   # sysName
      "1.3.6.1.2.1.1.1.0"    # sysDescr
    ]
    walk     => [
      "1.3.6.1.2.1.2.2",     # IF-MIB::ifTable          — interface metrics
      "1.3.6.1.2.1.4.22",    # IP-MIB::ipNetToMediaTable — ARP neighbours
      "1.3.6.1.2.1.17.4.3",  # BRIDGE-MIB::dot1dTpFdbTable — MAC forwarding
      "1.3.6.1.2.1.4.20"     # IP-MIB::ipAddrTable      — interface IPs + netmasks
    ]
    interval => 60
    add_field => {
      "[network][site]"  => "YOUR_SITE"    # e.g. HQ-DC1
      "[network][role]"  => "YOUR_ROLE"    # core | distribution | access | server
      "[host][type]"     => "YOUR_TYPE"    # router | switch | firewall | ap | server
    }
  }
}

filter {
  # Walk produces a flat map of MIB-resolved OID path → value pairs in one event.
  # Keys look like: iso.org.dod.internet.mgmt.mib-2.<subtree>.<table>.<entry>.<col>.<idx>
  # The Ruby filter classifies each key by MIB entry name in a single pass, then
  # emits one event per row for each table type.
  ruby {
    code => '
      # ── Common preamble ─────────────────────────────────────────────────────
      host_name = nil
      sys_descr = nil
      # [@metadata][host_address] is set by the SNMP plugin for every polled host.
      # ECS-disabled pipelines use the short path; ECS v1/v8 (Logstash 8 default)
      # uses the longer one.
      host_ip   = event.get("[@metadata][host_address]") ||
                  event.get("[@metadata][input][snmp][host][address]") || ""
      site      = event.get("[network][site]") || ""
      role      = event.get("[network][role]") || ""
      host_type = event.get("[host][type]") || ""
      timestamp = event.get("@timestamp")

      # Factory for new events pre-filled with fields common to every doc type.
      base = lambda do
        e = LogStash::Event.new
        e.set("@timestamp",            timestamp)
        e.set("[host][name]",          host_name.to_s)
        e.set("[host][ip]",            host_ip)
        e.set("[host][type]",          host_type) unless host_type.empty?
        e.set("[observer][sys_descr]", sys_descr.to_s)
        e.set("[network][site]",       site)
        e.set("[network][role]",       role)
        e
      end

      # ── Per-table column sets & lookup maps ─────────────────────────────────
      # Interface metrics
      if_cols   = %w[ifDescr ifSpeed ifAdminStatus ifOperStatus
                     ifInOctets ifInErrors ifOutOctets ifOutErrors].to_set
      admin_map = { "1" => "up", "2" => "down", "3" => "testing" }
      oper_map  = { "1" => "up", "2" => "down", "3" => "testing",
                    "4" => "unknown", "5" => "dormant" }

      # ARP table
      arp_cols  = %w[ipNetToMediaIfIndex ipNetToMediaPhysAddress
                     ipNetToMediaNetAddress].to_set

      # MAC forwarding table
      mac_cols   = %w[dot1dTpFdbAddress dot1dTpFdbPort dot1dTpFdbStatus].to_set
      status_map = { "3" => "learned", "4" => "static", "5" => "mgmt" }

      # IP address table — CIDR helpers
      ip_cols = %w[ipAdEntAddr ipAdEntNetMask ipAdEntIfIndex].to_set

      prefix_len = lambda do |mask|
        mask.split(".").map { |o| o.to_i.to_s(2).count("1") }.sum
      end

      to_cidr = lambda do |ip, mask|
        ip_p   = ip.split(".").map(&:to_i)
        mask_p = mask.split(".").map(&:to_i)
        net    = ip_p.zip(mask_p).map { |i, m| i & m }
        "#{net.join(".")}/#{prefix_len.call(mask)}"
      end

      # ── Single pass: classify each key by MIB entry name ────────────────────
      interfaces  = {}
      arp_entries = {}
      mac_entries = {}
      ip_entries  = {}

      event.to_hash.each do |key, val|
        # GET scalars — sysName / sysDescr
        if key =~ /sysName\.0$/i
          host_name = val.to_s
          next
        end
        if key =~ /sysDescr\.0$/i
          sys_descr = val.to_s
          next
        end

        # ifTable: ...ifEntry.<col>.<ifIndex>
        if (m = key.match(/\.ifEntry\.(\w+)\.(\d+(?:\.\d+)*)$/))
          col, idx = m[1], m[2]
          next unless if_cols.include?(col)
          (interfaces[idx] ||= {})[col] = val
          next
        end

        # ARP: ...ipNetToMediaEntry.<col>.<ifIdx>.<a>.<b>.<c>.<d>
        if (m = key.match(/\.ipNetToMediaEntry\.(\w+)\.(.+)$/))
          col, idx = m[1], m[2]
          next unless arp_cols.include?(col)
          (arp_entries[idx] ||= {})[col] = val
          next
        end

        # MAC forwarding: ...dot1dTpFdbEntry.<col>.<mac-octets>
        if (m = key.match(/\.dot1dTpFdbEntry\.(\w+)\.(.+)$/))
          col, idx = m[1], m[2]
          next unless mac_cols.include?(col)
          (mac_entries[idx] ||= {})[col] = val
          next
        end

        # IP address table: ...ipAddrEntry.<col>.<a.b.c.d>
        if (m = key.match(/\.ipAddrEntry\.(\w+)\.(\d+\.\d+\.\d+\.\d+)$/))
          col, ip_idx = m[1], m[2]
          next unless ip_cols.include?(col)
          (ip_entries[ip_idx] ||= {})[col] = val.to_s
          next
        end
      end

      # ── Emit interface metric documents ─────────────────────────────────────
      interfaces.each do |_idx, data|
        e = base.call
        e.set("[interface][name]",                data["ifDescr"].to_s)
        e.set("[interface][speed]",               data["ifSpeed"].to_i)
        e.set("[interface][traffic][in][bytes]",   data["ifInOctets"].to_i)
        e.set("[interface][traffic][out][bytes]",  data["ifOutOctets"].to_i)
        e.set("[interface][errors][in]",           data["ifInErrors"].to_i)
        e.set("[interface][errors][out]",          data["ifOutErrors"].to_i)
        e.set("[interface][status][admin]",
              admin_map[data["ifAdminStatus"].to_s] || data["ifAdminStatus"].to_s)
        e.set("[interface][status][oper]",
              oper_map[data["ifOperStatus"].to_s]   || data["ifOperStatus"].to_s)
        new_event_block.call(e)
      end

      # ── Emit ARP table documents ────────────────────────────────────────────
      arp_entries.each do |_idx, data|
        next unless data["ipNetToMediaPhysAddress"] && data["ipNetToMediaNetAddress"]
        e = base.call
        e.set("[arp][mac_addr]",        data["ipNetToMediaPhysAddress"].to_s)
        e.set("[arp][ip_addr]",         data["ipNetToMediaNetAddress"].to_s)
        e.set("[arp][interface_index]",  data["ipNetToMediaIfIndex"].to_i)
        new_event_block.call(e)
      end

      # ── Emit MAC forwarding table documents ─────────────────────────────────
      mac_entries.each do |_idx, data|
        sl = status_map[data["dot1dTpFdbStatus"].to_s]
        next unless sl   # drop other (1) / invalid (2) entries
        e = base.call
        e.set("[mac_table][mac_addr]",   data["dot1dTpFdbAddress"].to_s)
        e.set("[mac_table][port_index]", data["dot1dTpFdbPort"].to_i)
        e.set("[mac_table][status]",     sl)
        new_event_block.call(e)
      end

      # ── Emit IP address table documents (with computed CIDR) ────────────────
      ip_entries.each do |ip_idx, data|
        addr = data["ipAdEntAddr"] || ip_idx
        mask = data["ipAdEntNetMask"] || ""
        next if addr.empty? || mask.empty?

        # Skip loopback, link-local, multicast, unspecified
        first = addr.split(".").first.to_i
        next if first == 0 || first == 127 || first >= 224
        next if addr.start_with?("169.254.")

        e = base.call
        e.set("[ip_addr][address]",       addr)
        e.set("[ip_addr][netmask]",       mask)
        e.set("[ip_addr][network]",       to_cidr.call(addr, mask))
        e.set("[ip_addr][prefix_length]", prefix_len.call(mask))
        e.set("[ip_addr][if_index]",      data["ipAdEntIfIndex"].to_i)
        new_event_block.call(e)
      end

      event.cancel
    '
    tag_on_exception => "_ruby_exception"
  }

  # ── Safety net: drop skeleton events that slipped past event.cancel ─────
  # If the Ruby filter throws an exception, the original walk event survives
  # without any table-specific fields. Drop it so it doesn't pollute the index.
  if ![interface][name] and ![arp][mac_addr] and ![mac_table][mac_addr] and ![ip_addr][address] {
    drop {}
  }

  # ── Optional: per-device type overrides via dictionary file ──────────────
  # Uncomment this block if a single pipeline contains mixed device types.
  # The translate filter runs on each emitted event and overrides host.type
  # based on host.ip. The dictionary file is auto-reloaded every 300 seconds.
  #
  # translate {
  #   source      => "[host][ip]"
  #   target      => "[host][type]"
  #   override    => true
  #   fallback    => ""           # empty = keep the add_field default
  #   dictionary_path => "/etc/logstash/device-types.yml"
  #   refresh_interval => 300
  # }
  #
  # device-types.yml example:
  # ---
  # "10.0.0.1": "router"
  # "10.0.0.2": "firewall"
  # "10.0.0.10": "switch"
  # "10.0.0.50": "ap"

  # Drop events with an empty translate fallback (no type matched, no default)
  # if [host][type] == "" { mutate { remove_field => ["[host][type]"] } }
}

output {
  elasticsearch {
    hosts    => ["https://YOUR_ES_HOST:9200"]
    user     => "elastic"
    password => "YOUR_PASSWORD"
    ssl_certificate_verification => false
    index    => "snmp-%{+YYYY.MM.dd}"
    pipeline => "snmp-device-enrichment"
  }
}


# ── pipelines.yml example ──────────────────────────────────────────────────────
# Place in /etc/logstash/pipelines.yml (or your Logstash config directory).
# Duplicate this file per role, customising hosts, site, and role values.
#
# - pipeline.id: snmp-core
#   path.config: "/etc/logstash/conf.d/snmp-core.conf"
#   pipeline.workers: 1
#
# - pipeline.id: snmp-distribution
#   path.config: "/etc/logstash/conf.d/snmp-distribution.conf"
#   pipeline.workers: 1
#
# - pipeline.id: snmp-access
#   path.config: "/etc/logstash/conf.d/snmp-access.conf"
#   pipeline.workers: 1

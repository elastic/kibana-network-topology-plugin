# Logstash SNMP collector for kibana-network-o11y
# ──────────────────────────────────────────────────────────────────────────────
# Requirements:
#   bin/logstash-plugin install logstash-input-snmp
#   Logstash 8.x+
#
# This pipeline produces three document types per poll:
#   - Interface metrics (one doc per interface)
#   - ARP table entries (one doc per ARP entry)
#   - MAC forwarding table entries (one doc per MAC entry)
#
# Replace: DEVICE_IP, YOUR_SITE, YOUR_ROLE, YOUR_ES_HOST, YOUR_PASSWORD
# ──────────────────────────────────────────────────────────────────────────────

# ── Pipeline 1: Interface metrics ─────────────────────────────────────────────
input {
  snmp {
    id       => "snmp_interfaces"
    hosts    => [{ host => "udp:DEVICE_IP/161" community => "public" version => "2c" }]
    get      => [
      "1.3.6.1.2.1.1.5.0",   # sysName
      "1.3.6.1.2.1.1.1.0"    # sysDescr
    ]
    tables   => [
      {
        name    => "ifTable"
        columns => [
          "1.3.6.1.2.1.2.2.1.2",   # ifDescr
          "1.3.6.1.2.1.2.2.1.5",   # ifSpeed
          "1.3.6.1.2.1.2.2.1.7",   # ifAdminStatus (1=up, 2=down, 3=testing)
          "1.3.6.1.2.1.2.2.1.8",   # ifOperStatus  (1=up, 2=down, 3=testing)
          "1.3.6.1.2.1.2.2.1.10",  # ifInOctets
          "1.3.6.1.2.1.2.2.1.16",  # ifOutOctets
          "1.3.6.1.2.1.2.2.1.14",  # ifInErrors
          "1.3.6.1.2.1.2.2.1.20"   # ifOutErrors
        ]
      }
    ]
    interval => 60
    add_field => {
      "[host][ip]"       => "DEVICE_IP"
      "[network][site]"  => "YOUR_SITE"    # e.g. HQ-DC1
      "[network][role]"  => "YOUR_ROLE"    # core | distribution | access | server
    }
  }
}

filter {
  mutate {
    rename => {
      "[SNMPv2-MIB::sysName.0]"  => "[host][name]"
      "[SNMPv2-MIB::sysDescr.0]" => "[observer][sys_descr]"
    }
  }

  # Expand ifTable rows into individual interface documents
  split { field => "[ifTable]" }

  mutate {
    rename => {
      "[ifTable][ifDescr]"    => "[interface][name]"
      "[ifTable][ifSpeed]"    => "[interface][speed]"
      "[ifTable][ifInOctets]" => "[interface][traffic][in][bytes]"
      "[ifTable][ifOutOctets]"=> "[interface][traffic][out][bytes]"
      "[ifTable][ifInErrors]" => "[interface][errors][in]"
      "[ifTable][ifOutErrors]"=> "[interface][errors][out]"
    }
    # Map integer status codes → string values
    gsub => [
      "[ifTable][ifAdminStatus]", "^1$", "up",
      "[ifTable][ifAdminStatus]", "^2$", "down",
      "[ifTable][ifAdminStatus]", "^3$", "testing"
    ]
    gsub => [
      "[ifTable][ifOperStatus]", "^1$", "up",
      "[ifTable][ifOperStatus]", "^2$", "down",
      "[ifTable][ifOperStatus]", "^3$", "testing",
      "[ifTable][ifOperStatus]", "^4$", "unknown",
      "[ifTable][ifOperStatus]", "^5$", "dormant"
    ]
    rename => {
      "[ifTable][ifAdminStatus]" => "[interface][status][admin]"
      "[ifTable][ifOperStatus]"  => "[interface][status][oper]"
    }
    remove_field => ["[ifTable]", "host", "tags"]  # clean up raw SNMP fields
  }
}

output {
  elasticsearch {
    hosts    => ["https://YOUR_ES_HOST:9200"]
    user     => "elastic"
    password => "YOUR_PASSWORD"
    ssl_certificate_verification => false
    index    => "snmp-%{+YYYY.MM.dd}"
    pipeline => "snmp-device-enrichment"
  }
}


# ── Pipeline 2: ARP table ──────────────────────────────────────────────────────
# Run as a separate Logstash pipeline (pipelines.yml) or merge into pipeline 1.

input {
  snmp {
    id    => "snmp_arp"
    hosts => [{ host => "udp:DEVICE_IP/161" community => "public" version => "2c" }]
    get   => [
      "1.3.6.1.2.1.1.5.0",   # sysName
      "1.3.6.1.2.1.1.1.0"    # sysDescr
    ]
    tables => [
      {
        name    => "arpTable"
        columns => [
          "1.3.6.1.2.1.4.22.1.1",  # ipNetToMediaIfIndex
          "1.3.6.1.2.1.4.22.1.2",  # ipNetToMediaPhysAddress (MAC)
          "1.3.6.1.2.1.4.22.1.3"   # ipNetToMediaNetAddress  (IP)
        ]
      }
    ]
    interval => 120
    add_field => {
      "[host][ip]"      => "DEVICE_IP"
      "[network][site]" => "YOUR_SITE"
      "[network][role]" => "YOUR_ROLE"
    }
  }
}

filter {
  mutate {
    rename => {
      "[SNMPv2-MIB::sysName.0]"  => "[host][name]"
      "[SNMPv2-MIB::sysDescr.0]" => "[observer][sys_descr]"
    }
  }
  split { field => "[arpTable]" }
  mutate {
    rename => {
      "[arpTable][ipNetToMediaPhysAddress]" => "[arp][mac_addr]"
      "[arpTable][ipNetToMediaNetAddress]"  => "[arp][ip_addr]"
      "[arpTable][ipNetToMediaIfIndex]"     => "[arp][interface_index]"
    }
    remove_field => ["[arpTable]"]
  }
}

output {
  elasticsearch {
    hosts    => ["https://YOUR_ES_HOST:9200"]
    user     => "elastic"
    password => "YOUR_PASSWORD"
    ssl_certificate_verification => false
    index    => "snmp-%{+YYYY.MM.dd}"
    pipeline => "snmp-device-enrichment"
  }
}


# ── Pipeline 3: MAC forwarding table (switches only) ──────────────────────────

input {
  snmp {
    id    => "snmp_mac_table"
    hosts => [{ host => "udp:DEVICE_IP/161" community => "public" version => "2c" }]
    get   => [
      "1.3.6.1.2.1.1.5.0",
      "1.3.6.1.2.1.1.1.0"
    ]
    tables => [
      {
        name    => "macTable"
        columns => [
          "1.3.6.1.2.1.17.4.3.1.1",  # dot1dTpFdbAddress
          "1.3.6.1.2.1.17.4.3.1.2",  # dot1dTpFdbPort
          "1.3.6.1.2.1.17.4.3.1.3"   # dot1dTpFdbStatus (1=other,2=invalid,3=learned,4=self,5=mgmt)
        ]
      }
    ]
    interval => 120
    add_field => {
      "[host][ip]"      => "DEVICE_IP"
      "[network][site]" => "YOUR_SITE"
      "[network][role]" => "YOUR_ROLE"
    }
  }
}

filter {
  mutate {
    rename => {
      "[SNMPv2-MIB::sysName.0]"  => "[host][name]"
      "[SNMPv2-MIB::sysDescr.0]" => "[observer][sys_descr]"
    }
  }
  split { field => "[macTable]" }
  mutate {
    rename => {
      "[macTable][dot1dTpFdbAddress]" => "[mac_table][mac_addr]"
      "[macTable][dot1dTpFdbPort]"    => "[mac_table][port_index]"
    }
    gsub => [
      "[macTable][dot1dTpFdbStatus]", "^3$", "learned",
      "[macTable][dot1dTpFdbStatus]", "^4$", "static",
      "[macTable][dot1dTpFdbStatus]", "^5$", "mgmt"
    ]
    rename => { "[macTable][dot1dTpFdbStatus]" => "[mac_table][status]" }
    remove_field => ["[macTable]"]
  }
  # Skip invalid/other entries
  if [mac_table][status] !~ /^(learned|static|mgmt)$/ { drop {} }
}

output {
  elasticsearch {
    hosts    => ["https://YOUR_ES_HOST:9200"]
    user     => "elastic"
    password => "YOUR_PASSWORD"
    ssl_certificate_verification => false
    index    => "snmp-%{+YYYY.MM.dd}"
    pipeline => "snmp-device-enrichment"
  }
}

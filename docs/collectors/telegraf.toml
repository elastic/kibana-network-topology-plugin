# Telegraf SNMP collector for kibana-network-o11y
# ──────────────────────────────────────────────────────────────────────────────
# Requirements: Telegraf 1.20+
# Replace: DEVICE_IP, YOUR_SITE, YOUR_ROLE, YOUR_ES_HOST, YOUR_PASSWORD
#
# All three table sections use SNMP Walk: specifying only the root OID on
# [[inputs.snmp.table]] (no field sub-entries) causes Telegraf to walk the
# entire subtree in a single GETBULK sequence rather than issuing per-column
# requests. This is gentler on device SNMP agents.
# ──────────────────────────────────────────────────────────────────────────────

[agent]
  interval = "60s"
  flush_interval = "60s"

# ── Interface metrics ──────────────────────────────────────────────────────────
[[inputs.snmp]]
  agents  = ["udp://DEVICE_IP:161"]
  version = 2
  community = "public"
  name    = "snmp_interface"

  # Device-level scalars (GET)
  [[inputs.snmp.field]]
    name = "sysName"
    oid  = "SNMPv2-MIB::sysName.0"
  [[inputs.snmp.field]]
    name = "sysDescr"
    oid  = "SNMPv2-MIB::sysDescr.0"

  # Walk the entire ifTable subtree — one measurement row per interface
  [[inputs.snmp.table]]
    name         = "ifTable"
    oid          = "IF-MIB::ifTable"
    inherit_tags = ["sysName", "sysDescr", "agent_host"]

# ── ARP table ─────────────────────────────────────────────────────────────────
[[inputs.snmp]]
  agents    = ["udp://DEVICE_IP:161"]
  version   = 2
  community = "public"
  name      = "snmp_arp"
  interval  = "120s"

  [[inputs.snmp.field]]
    name = "sysName"
    oid  = "SNMPv2-MIB::sysName.0"
  [[inputs.snmp.field]]
    name = "sysDescr"
    oid  = "SNMPv2-MIB::sysDescr.0"

  # Walk the entire ipNetToMediaTable subtree
  [[inputs.snmp.table]]
    name         = "ipNetToMediaTable"
    oid          = "IP-MIB::ipNetToMediaTable"
    inherit_tags = ["sysName", "sysDescr"]

# ── MAC forwarding table (switches only) ─────────────────────────────────────
[[inputs.snmp]]
  agents    = ["udp://DEVICE_IP:161"]
  version   = 2
  community = "public"
  name      = "snmp_mac_table"
  interval  = "120s"

  [[inputs.snmp.field]]
    name = "sysName"
    oid  = "SNMPv2-MIB::sysName.0"
  [[inputs.snmp.field]]
    name = "sysDescr"
    oid  = "SNMPv2-MIB::sysDescr.0"

  # Walk the entire dot1dTpFdbTable subtree
  [[inputs.snmp.table]]
    name         = "dot1dTpFdbTable"
    oid          = "BRIDGE-MIB::dot1dTpFdbTable"
    inherit_tags = ["sysName", "sysDescr"]

# ── Rename fields to plugin schema ────────────────────────────────────────────
[[processors.rename]]
  namepass = ["ifTable"]
  [[processors.rename.replace]]
    field = "sysName"
    dest  = "host.name"
  [[processors.rename.replace]]
    field = "sysDescr"
    dest  = "observer.sys_descr"
  [[processors.rename.replace]]
    tag   = "agent_host"
    dest  = "host.ip"
  [[processors.rename.replace]]
    tag   = "ifDescr"
    dest  = "interface.name"
  [[processors.rename.replace]]
    field = "ifSpeed"
    dest  = "interface.speed"
  [[processors.rename.replace]]
    field = "ifAdminStatus"
    dest  = "interface.status.admin"
  [[processors.rename.replace]]
    field = "ifOperStatus"
    dest  = "interface.status.oper"
  [[processors.rename.replace]]
    field = "ifInOctets"
    dest  = "interface.traffic.in.bytes"
  [[processors.rename.replace]]
    field = "ifOutOctets"
    dest  = "interface.traffic.out.bytes"
  [[processors.rename.replace]]
    field = "ifInErrors"
    dest  = "interface.errors.in"
  [[processors.rename.replace]]
    field = "ifOutErrors"
    dest  = "interface.errors.out"

[[processors.rename]]
  namepass = ["ipNetToMediaTable"]
  [[processors.rename.replace]]
    field = "sysName"
    dest  = "host.name"
  [[processors.rename.replace]]
    field = "sysDescr"
    dest  = "observer.sys_descr"
  [[processors.rename.replace]]
    field = "ipNetToMediaPhysAddress"
    dest  = "arp.mac_addr"
  [[processors.rename.replace]]
    tag   = "ipNetToMediaNetAddress"
    dest  = "arp.ip_addr"

[[processors.rename]]
  namepass = ["dot1dTpFdbTable"]
  [[processors.rename.replace]]
    field = "sysName"
    dest  = "host.name"
  [[processors.rename.replace]]
    field = "sysDescr"
    dest  = "observer.sys_descr"
  [[processors.rename.replace]]
    tag   = "dot1dTpFdbAddress"
    dest  = "mac_table.mac_addr"
  [[processors.rename.replace]]
    field = "dot1dTpFdbPort"
    dest  = "mac_table.port_index"
  [[processors.rename.replace]]
    field = "dot1dTpFdbStatus"
    dest  = "mac_table.status"

# ── Add static site/role tags ─────────────────────────────────────────────────
[[processors.override]]
  [processors.override.tags]
    "network.site" = "YOUR_SITE"   # e.g. HQ-DC1
    "network.role" = "YOUR_ROLE"   # core | distribution | access | server

# ── Output to Elasticsearch ──────────────────────────────────────────────────
[[outputs.elasticsearch]]
  urls      = ["https://YOUR_ES_HOST:9200"]
  username  = "elastic"
  password  = "YOUR_PASSWORD"
  insecure_skip_verify = true
  index_name = "snmp-%Y.%m.%d"
  pipeline   = "snmp-device-enrichment"
  [outputs.elasticsearch.headers]
    Content-Type = "application/json"

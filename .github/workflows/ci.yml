name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  license_headers:
    name: License headers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.0"

      - name: Check license headers
        run: node scripts/check_license_headers.mjs

